<!DOCTYPE html>
<html>
<head>
<style>
#boot{position:fixed;inset:0;z-index:9999;background:#0a0a0a;display:flex;align-items:center;justify-content:center;transition:opacity .6s,visibility .6s}
#boot.done{opacity:0;visibility:hidden;pointer-events:none}
#app{display:none;flex-direction:column;height:100vh}
#app.show{display:flex}
</style>
</head>
<body>
<div id="boot">
  <div style="color:#fff;font-family:monospace">
    <div id="bootBody"></div>
    <div style="margin-top:10px"><div style="width:100%;height:3px;background:#333;border-radius:2px"><div id="bootProgressBar" style="height:100%;background:#4ec9b0;border-radius:2px;width:0;transition:width .3s"></div></div></div>
    <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#858585"><span id="bootStatus">initializing...</span><span>UTF-8</span></div>
  </div>
</div>
<div id="app"><h1 style="color:#fff;padding:20px">It works!</h1></div>
<script>
window.onerror=function(m,s,l,c,e){document.getElementById('bootBody').innerHTML='<div style="color:red;padding:8px">JS ERROR line '+l+': '+m+'</div>';return false};
var lines=[
  {t:'[OK] Initializing environment...',d:200},
  {t:'[OK] Loading font...',d:300},
  {t:'[OK] Compiling layout...',d:250},
  {t:'[OK] Fetching repos...',d:350},
  {t:'[OK] Setting up XP...',d:200},
  {t:'[OK] Initializing terminal...',d:200},
  {t:'[OK] Loading achievements...',d:180},
  {t:'[OK] Activating VFX...',d:220},
  {t:'[OK] Compiling shop...',d:180},
  {t:'[SYS] Portfolio ready.',d:300}
];
var body=document.getElementById('bootBody'),status=document.getElementById('bootStatus'),bar=document.getElementById('bootProgressBar');
var delay=200;
lines.forEach(function(l,i){
  setTimeout(function(){var e=document.createElement('div');e.textContent=l.t;body.appendChild(e);status.textContent='loading ('+(i+1)+'/'+lines.length+')';bar.style.width=((i+1)/lines.length*100)+'%'},delay);
  delay+=l.d;
});
setTimeout(function(){status.textContent='ready';bar.style.width='100%';setTimeout(function(){
  document.getElementById('boot').classList.add('done');
  document.getElementById('app').classList.add('show');
},400)},delay+200);
</script>
</body>
</html>
